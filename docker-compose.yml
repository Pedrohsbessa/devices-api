# Compose stack: Postgres, one-shot migrator, and the Devices API.
#
# Usage:
#   cp .env.example .env
#   docker compose up --build
#
# Lifecycle:
#   postgres starts -> becomes healthy -> migrate runs migrations once and
#   exits -> api depends on both and starts only after the schema is ready.

name: devices-api

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devices}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devices}
      POSTGRES_DB: ${POSTGRES_DB:-devices}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devices} -d ${POSTGRES_DB:-devices}"]
      interval: 2s
      timeout: 3s
      retries: 15

  migrate:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command: >
      -path=/migrations
      -database=postgres://${POSTGRES_USER:-devices}:${POSTGRES_PASSWORD:-devices}@postgres:5432/${POSTGRES_DB:-devices}?sslmode=disable
      up
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-devices}:${POSTGRES_PASSWORD:-devices}@postgres:5432/${POSTGRES_DB:-devices}?sslmode=disable
      HTTP_ADDR: ":8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "${HTTP_PORT:-8080}:8080"

volumes:
  postgres-data:
